# Daemon
exec-once = gnome-keyring-daemon --daemonize --start --components=gpg,pkcs11,secrets,ssh

# Start xhost for root access (for autostart scripts that require it)
# exec-once = xhost +SI:localuser:root

# Start Tuxedo Control Center in the system tray
# exec-once = tuxedo-control-center --tray

# Wifi
exec-once = nm-applet --indicator